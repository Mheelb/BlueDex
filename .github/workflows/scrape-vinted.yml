name: Scrape Vinted Prices

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}
  # TODO: retirer ce trigger une fois le scraper validé en conditions réelles
  # sur un runner GitHub-hosted — sert juste à tester sans passer par main.
  push:
    branches: [feature/price]

concurrency:
  group: scrape-vinted
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run scraper
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run scrape:vinted
